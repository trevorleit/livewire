<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LiveWire</title>
    <meta http-equiv="refresh" content="{{ refresh_seconds }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='phase75_actions.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      window.livewireAccent = "#00cc66";
      if (window.Chart) {
        Chart.defaults.color = "#9fb5ca";
        Chart.defaults.borderColor = "rgba(255,255,255,0.08)";
        Chart.defaults.font.family = "Inter, Arial, Helvetica, sans-serif";
      }
    </script>

    <style>
        .site-header{
            padding: 10px 28px;
            border-bottom: 1px solid rgba(0, 204, 102, 0.14);
        }

        .header-inner{
            max-width: 1440px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 280px 1fr 150px;
            align-items: center;
            gap: 20px;
        }

        .brand-wrap{
            display: flex;
            align-items: center;
            justify-content: flex-start;
            min-height: 96px;
        }

        .livewire-logo{
            max-height: 240px;
            max-width: 360px;
            width: auto;
            height: auto;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(0, 204, 102, 0.45));
        }

        .header-nav{
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 18px;
            line-height: 1;
        }

        .header-nav a{
            color: #a9bbcd;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease, text-shadow 0.2s ease;
            white-space: nowrap;
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .header-nav a:hover{
            color: #00cc66;
            text-shadow: 0 0 10px rgba(0, 204, 102, 0.35);
        }

        .header-nav a.active{
            color: #00cc66;
            text-shadow: 0 0 12px rgba(0, 204, 102, 0.45);
        }

        .header-nav a.active::before{
            content: "";
            display: inline-block;
            width: 7px;
            height: 7px;
            margin-right: 8px;
            border-radius: 50%;
            background: #00cc66;
            animation: dotPulse 1.6s infinite;
        }

        .header-nav a.active::after{
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 100%;
            height: 2px;
            background: #00cc66;
            border-radius: 2px;
            animation: navPulse 2.2s infinite;
        }

        .header-meta{
            text-align: right;
            font-size: 16px;
            color: #7f97ac;
            white-space: nowrap;
        }

        @keyframes navPulse{
            0%{
                opacity: .4;
                box-shadow: 0 0 0 rgba(0, 204, 102, 0);
            }

            50%{
                opacity: 1;
                box-shadow: 0 0 10px rgba(0, 204, 102, 0.9);
            }

            100%{
                opacity: .4;
                box-shadow: 0 0 0 rgba(0, 204, 102, 0);
            }
        }

        @keyframes dotPulse{
            0%{
                transform: scale(.9);
                box-shadow: 0 0 0 0 rgba(0, 204, 102, 0.7);
            }

            50%{
                transform: scale(1.3);
                box-shadow: 0 0 6px 3px rgba(0, 204, 102, 0.35);
            }

            100%{
                transform: scale(.9);
                box-shadow: 0 0 0 0 rgba(0, 204, 102, 0);
            }
        }

        @media (max-width: 1100px){
            .header-inner{
                grid-template-columns: 1fr;
                justify-items: center;
                text-align: center;
            }

            .brand-wrap{
                justify-content: center;
                min-height: auto;
            }

            .header-nav{
                justify-content: center;
            }

            .header-meta{
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">

            <div class="brand-wrap">
                <img
                    src="{{ url_for('static', filename='img/LiveWire_logo.png') }}"
                    alt="LiveWire Logo"
                    class="livewire-logo"
                >
            </div>

            <nav class="header-nav">
                <a class="{% if request.endpoint == 'dashboard.index' %}active{% endif %}"
                   href="{{ url_for('dashboard.index') }}">Dashboard</a>

                <a class="{% if request.endpoint == 'alerts.alerts' %}active{% endif %}"
                   href="{{ url_for('alerts.alerts') }}">Alerts</a>

                <a class="{% if request.endpoint == 'response_center.response_center' %}active{% endif %}"
                   href="{{ url_for('response_center.response_center') }}">Response Center</a>

                <a class="{% if request.endpoint == 'events.events' %}active{% endif %}"
                   href="{{ url_for('events.events') }}">Events</a>

                <a class="{% if request.endpoint == 'actions.actions' %}active{% endif %}"
                   href="{{ url_for('actions.actions') }}">Actions</a>

                <a class="{% if request.endpoint == 'automation.automation' %}active{% endif %}"
                   href="{{ url_for('automation.automation') }}">Automation</a>

                <a class="{% if request.endpoint == 'inventory.inventory' %}active{% endif %}"
                   href="{{ url_for('inventory.inventory') }}">Inventory</a>

                <a class="{% if request.endpoint == 'settings.settings' %}active{% endif %}"
                   href="{{ url_for('settings.settings') }}">Settings</a>
            </nav>

            <div class="header-meta">
                Auto refresh: {{ refresh_seconds }}s
            </div>

        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
