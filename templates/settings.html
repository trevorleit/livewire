{% extends "base.html" %}
{% block content %}
<section class="panel">
  <div class="panel-header">
    <h2>Settings</h2>
    <p>Adjust thresholds, refresh behavior, and notification delivery for LiveWire.</p>
  </div>
  <form method="post" class="settings-form">
    <div class="settings-grid">
      <label class="field"><span>CPU alert threshold (%)</span><input type="number" step="0.1" name="cpu_alert_threshold" value="{{ settings_map.get('cpu_alert_threshold', '90') }}"></label>
      <label class="field"><span>RAM alert threshold (%)</span><input type="number" step="0.1" name="ram_alert_threshold" value="{{ settings_map.get('ram_alert_threshold', '90') }}"></label>
      <label class="field"><span>Disk alert threshold (%)</span><input type="number" step="0.1" name="disk_alert_threshold" value="{{ settings_map.get('disk_alert_threshold', '90') }}"></label>
      <label class="field"><span>Temperature alert threshold (°C)</span><input type="number" step="0.1" name="temp_alert_threshold" value="{{ settings_map.get('temp_alert_threshold', '85') }}"></label>
      <label class="field"><span>Auto refresh (seconds)</span><input type="number" name="refresh_seconds" value="{{ settings_map.get('refresh_seconds', '10') }}"></label>
      <label class="field"><span>Offline after (seconds)</span><input type="number" name="offline_after_seconds" value="{{ settings_map.get('offline_after_seconds', '90') }}"></label>
      <label class="field"><span>Top processes shown</span><input type="number" name="max_top_processes" value="{{ settings_map.get('max_top_processes', '8') }}"></label>
      <label class="field field-wide"><span>Discord webhook URL</span><input type="text" name="discord_webhook_url" value="{{ settings_map.get('discord_webhook_url', '') }}" placeholder="https://discord.com/api/webhooks/..." autocomplete="off"></label>
      <label class="field field-wide"><span>Notification email recipients</span><input type="text" name="notification_email_to" value="{{ settings_map.get('notification_email_to', '') }}" placeholder="ops@example.com, alerts@example.com"></label>
      <label class="field"><span>SMTP host</span><input type="text" name="smtp_host" value="{{ settings_map.get('smtp_host', '') }}"></label>
      <label class="field"><span>SMTP port</span><input type="number" name="smtp_port" value="{{ settings_map.get('smtp_port', '587') }}"></label>
      <label class="field"><span>SMTP username</span><input type="text" name="smtp_username" value="{{ settings_map.get('smtp_username', '') }}"></label>
      <label class="field"><span>SMTP password</span><input type="password" name="smtp_password" value="{{ settings_map.get('smtp_password', '') }}" autocomplete="new-password"></label>
      <label class="field"><span>From address</span><input type="text" name="smtp_from" value="{{ settings_map.get('smtp_from', 'livewire@localhost') }}"></label>
      <label class="checkbox-field"><input type="checkbox" name="smtp_use_tls" {% if settings_map.get('smtp_use_tls', '1') in ['1', 'true', 'True', 'yes', 'on'] %}checked{% endif %}> <span>Use TLS for SMTP</span></label>
    </div>
    <div class="form-actions">
      <button type="submit" name="form_action" value="save" class="button-primary">Save Settings</button>
      <button type="submit" name="form_action" value="save_and_test" class="button-secondary">Save + Send Test Notification</button>
    </div>
  </form>
</section>
{% endblock %}
